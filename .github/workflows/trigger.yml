name: Bootstrap landing

on:
  push:
    paths:
      - ".github/workflows/trigger.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore and publish landing
        shell: bash
        run: |
          set -euo pipefail
          sed -n "/<<'LANDING_ARCHIVE'/,/^[[:space:]]*LANDING_ARCHIVE$/p" .github/workflows/publish.yml \
            | sed '1d;$d;s/^          //' \
            | base64 -d > /tmp/landing-site.tar.gz
          tar -xzf /tmp/landing-site.tar.gz -C .
          rm -rf .github/workflows
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish landing Masterclass Radiestesia"
          git push origin HEAD:main
