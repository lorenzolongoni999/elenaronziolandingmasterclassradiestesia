name: Publish landing update

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply landing update
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          from pathlib import Path
          payload = """"""
          Path('/tmp/landing-patch.tar.gz').write_bytes(base64.b64decode(payload))
          PY
          tar -xzf /tmp/landing-patch.tar.gz -C .
          rm -rf .github/workflows
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update landing visuals and animations"
          git push
